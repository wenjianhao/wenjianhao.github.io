baseURL: "https://www.wenjianhao.com/"
title: Wenjian Hao
theme: PaperMod

enableInlineShortcodes: true
enableRobotsTXT: true
pagination:
  pagerSize: 20

taxonomies:
  tag: tags

menu:
  main:
    - name: About
      url: about/
      weight: 1
    - name: Papers
      url: papers/
      weight: 2
    - name: Projects
      url: projects/
      weight: 3
    - name: Blog
      url: blog/
      weight: 4
