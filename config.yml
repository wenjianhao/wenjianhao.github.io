params:
  description: "Personal website of Wenjian Hao: quantitative research, machine learning, and data science."
  author: Wenjian Hao
  DateFormat: "January 2006"
  defaultTheme: light
  hideFooter: false
  disableThemeToggle: true
  ShowShareButtons: false
  ShowReadingTime: false
  disableSpecial1stPost: true
  disableAnchoredHeadings: true
  ShowPostNavLinks: false
  ShowBreadCrumbs: false
  ShowCodeCopyButtons: true
  ShowAllPagesInArchive: false
  MainSections: ["about", "papers", "projects", "blog", "miscellaneous"]
  ShowToc: false
  disableScrollToTop: true
  TocOpen: true
  ShowWordCount: false
  UseHugoToc: true
  comments: false
  math: false
  profileMode:
    enabled: true
    title: Wenjian Hao
    subtitle: "I am a Ph.D. candidate in the School of Aeronautics and Astronautics at Purdue University, advised by Dr. Shaoshuai Mou. My research focuses on data-driven modeling and control of complex dynamical systems, including Koopman-based dynamics learning, data-efficient reinforcement learning, safety-critical optimal control, and robotics."
    imageUrl: "wenjian-hao.jpg"
    imageWidth: 180
    imageHeight: 180
    buttons:
      - name: About
        url: about/
      - name: Papers
        url: papers/
      - name: Projects
        url: projects/
      - name: Blog
        url: blog/
      - name: Miscellaneous
        url: miscellaneous/

  socialIcons:
    - name: Email
      url: haowjz@gmail.com:
    - name: Google Scholar
      url: https://scholar.google.com/citations?user=SQ2BSVsAAAAJ&hl=en
    - name: GitHub
      url: https://github.com/wenjianhao

  assets:
    disableScrollBarStyle: true
  cover:
    hiddenInList: false
    hiddenInSingle: true
  label:
    text: "Wenjian Hao"
    icon: favicon.ico
    iconHeight: 18

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    guessSyntax: true
    style: autumn
  tableOfContents:
    endLevel: 2
    ordered: false
    startLevel: 2
