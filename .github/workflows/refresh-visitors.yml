name: Refresh Visitor Data

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */12 * * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch GoatCounter visitor data
        env:
          GOATCOUNTER_CODE: ${{ secrets.GOATCOUNTER_CODE }}
          GOATCOUNTER_ENDPOINT: ${{ secrets.GOATCOUNTER_ENDPOINT }}
          GOATCOUNTER_API_KEY: ${{ secrets.GOATCOUNTER_API_KEY }}
        run: python3 scripts/fetch_goatcounter.py

      - name: Rebuild site
        env:
          GOATCOUNTER_CODE: ${{ secrets.GOATCOUNTER_CODE }}
          GOATCOUNTER_ENDPOINT: ${{ secrets.GOATCOUNTER_ENDPOINT }}
        run: python3 scripts/build_static_site.py

      - name: Commit updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add static/data/visitors.json data/visitors.json index.html papers/ projects/ blog/ miscellaneous/ 404.html css/site.css js/ scripts/ .github/workflows/refresh-visitors.yml
          git diff --cached --quiet || git commit -m "Refresh visitor analytics"
          git push
